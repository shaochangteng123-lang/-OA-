# ============================================
# YuliLog 工作日志系统 - 生产模式 Docker Compose
# ============================================
# 使用方法：
#   启动：docker compose -f docker-compose.prod.yml up -d --build
#   日志：docker compose -f docker-compose.prod.yml logs -f
#   停止：docker compose -f docker-compose.prod.yml down
# ============================================

services:
  yulilog:
    container_name: yulilog-prod
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8899:8899"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=8899
      - DATABASE_PATH=/app/data/worklog.db
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8899/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
