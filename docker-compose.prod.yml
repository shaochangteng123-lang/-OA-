# ============================================
# YuliLog 工作日志系统 - 生产模式 Docker Compose
# ============================================
# 使用方法：
#   启动：docker compose -f docker-compose.prod.yml up -d --build
#   日志：docker compose -f docker-compose.prod.yml logs -f
#   停止：docker compose -f docker-compose.prod.yml down
# ============================================

services:
  postgres:
    container_name: yulilog-postgres-prod
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=yulilog_worklog
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - TZ=Asia/Shanghai
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d yulilog_worklog"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  yulilog:
    container_name: yulilog-prod
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8899:8899"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=8899
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/yulilog_worklog
      - TZ=Asia/Shanghai
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8899/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data_prod:
