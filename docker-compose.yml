# ============================================
# YuliLog 工作日志系统 - 开发模式 Docker Compose
# ============================================
# 使用方法：
#   启动：docker compose up -d --build
#   日志：docker compose logs -f
#   停止：docker compose down
# ============================================

name: yulilog-dev

services:
  postgres:
    container_name: yulilog-worklog-postgres
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=yulilog_worklog
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - TZ=Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d yulilog_worklog"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    ports:
      - "5432:5432"
    networks:
      - dev_network

  yulilog-dev:
    container_name: yulilog-worklog-dev
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "0.0.0.0:8899:8899"   # Vite 前端（局域网可访问）
      - "0.0.0.0:3000:3000"   # Express 后端（局域网可访问）
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/yulilog_worklog
      - TZ=Asia/Shanghai
      - VITE_ALLOWED_HOSTS=all
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # 数据持久化
      - ./uploads:/app/uploads
      - ./debug:/app/debug
      # 源代码挂载（热重载）
      - ./src:/app/src
      - ./server:/app/server
      - ./public:/app/public
      # 配置文件
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.node.json:/app/tsconfig.node.json
      - ./tsconfig.server.json:/app/tsconfig.server.json
      - ./vite.config.ts:/app/vite.config.ts
      - ./index.html:/app/index.html
    restart: unless-stopped
    networks:
      - dev_network

volumes:
  postgres_data:
    external: true
    name: yulilog-worklog_postgres_data

networks:
  dev_network:
    name: yulilog_dev_network
