# ============================================
# YuliLog 工作日志系统 - Docker Compose 配置
# ============================================
# 使用方法：
#   启动：docker compose up -d --build
#   停止：docker compose down
#   日志：docker compose logs -f
# ============================================

services:
  yulilog:
    container_name: yulilog-app
    build:
      context: .
      dockerfile: Dockerfile
    image: yulilog:latest
    ports:
      - "${HOST_PORT:-8899}:8899"
    environment:
      - NODE_ENV=production
      - PORT=8899
      - DATABASE_PATH=/app/data/worklog.db
      - TZ=Asia/Shanghai
      - SESSION_SECRET=${SESSION_SECRET:-yulilog_default_session_secret_2025}
      # 百度OCR配置（从.env文件读取）
      - BAIDU_OCR_API_KEY=${BAIDU_OCR_API_KEY:-}
      - BAIDU_OCR_SECRET_KEY=${BAIDU_OCR_SECRET_KEY:-}
      # 腾讯云OCR配置（备用）
      - TENCENT_SECRET_ID=${TENCENT_SECRET_ID:-}
      - TENCENT_SECRET_KEY=${TENCENT_SECRET_KEY:-}
      # 飞书配置
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET:-}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8899/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
