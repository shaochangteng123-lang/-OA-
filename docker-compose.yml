# ============================================
# YuliLog 工作日志系统 - 开发模式 Docker Compose
# ============================================
# 使用方法：
#   启动：docker compose up -d
#   日志：docker compose logs -f
#   停止：docker compose down
# ============================================

services:
  yulilog-dev:
    container_name: yulilog-dev
    image: node:20-alpine
    ports:
      - "8899:8899"   # Vite 前端
      - "3000:3000"   # Express 后端
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_PATH=/app/data/worklog.db
      - TZ=Asia/Shanghai
    working_dir: /app
    volumes:
      # 数据持久化
      - ./data:/app/data
      - ./uploads:/app/uploads
      # 源代码挂载（热重载）
      - ./src:/app/src
      - ./server:/app/server
      - ./public:/app/public
      # 配置文件
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.node.json:/app/tsconfig.node.json
      - ./tsconfig.server.json:/app/tsconfig.server.json
      - ./vite.config.ts:/app/vite.config.ts
      - ./index.html:/app/index.html
      # node_modules 命名卷
      - node_modules:/app/node_modules
    command: >
      sh -c "
        apk add --no-cache python3 make g++ sqlite sqlite-libs &&
        npm ci --prefer-offline &&
        npm run dev
      "
    restart: unless-stopped

volumes:
  node_modules:
